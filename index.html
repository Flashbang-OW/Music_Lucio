<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lúcio.fm - DJ Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================
                   LOGIN SCREEN
                   ============================================ */
        #loginScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0A0A0A;
            z-index: 1000;
        }

        #loginScreen.hidden {
            display: none !important;
        }

        .login-box {
            background: #141414;
            border-radius: 12px;
            padding: 40px 32px;
            width: 420px;
            max-width: 92%;
            border: 1px solid #2A2A2A;
            max-height: 90vh;
            overflow-y: auto;
        }

        .login-box h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .login-box h1 span {
            color: #1DB954;
        }

        .login-box .sub {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .login-box .field {
            margin-bottom: 14px;
        }

        .login-box .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #B0B0B0;
            margin-bottom: 4px;
        }

        .login-box .field input,
        .login-box .field select {
            width: 100%;
            padding: 10px 14px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .login-box .field input:focus,
        .login-box .field select:focus {
            border-color: #1DB954;
        }

        .login-box .field select option {
            background: #222;
        }

        .login-box .btn {
            width: 100%;
            padding: 12px;
            background: #1DB954;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .login-box .btn:hover {
            background: #1ED760;
        }

        .login-box .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-box .btn-secondary {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            color: #B0B0B0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .login-box .btn-secondary:hover {
            border-color: #666;
            color: #fff;
        }

        .login-box .toggle-link {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin: 16px 0;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-box .toggle-link:hover {
            color: #fff;
        }

        .login-box .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            color: #666;
            font-size: 13px;
        }

        .login-box .divider::before,
        .login-box .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2A2A2A;
        }

        .login-box .msg {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .login-box .msg.show {
            display: block;
        }

        .login-box .msg.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #F87171;
        }

        .login-box .msg.success {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.3);
            color: #1DB954;
        }

        .login-box .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #fff;
        }

        /* ============================================
                   APP
                   ============================================ */
        #app {
            display: none !important;
            height: 100vh;
            flex-direction: column;
            background: #0A0A0A;
        }

        #app.visible {
            display: flex !important;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #141414;
            border-bottom: 1px solid #2A2A2A;
            flex-shrink: 0;
        }

        .topbar .brand {
            font-size: 18px;
            font-weight: 700;
        }

        .topbar .brand span {
            color: #1DB954;
        }

        .topbar .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar .import-btn {
            padding: 6px 16px;
            background: #1DB954;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .topbar .import-btn:hover {
            background: #1ED760;
        }

        .topbar .user-name {
            color: #B0B0B0;
            font-size: 13px;
        }

        .topbar .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1DB954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
        }

        .topbar .logout-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .topbar .logout-btn:hover {
            border-color: #EF4444;
            color: #EF4444;
        }

        .dj-container {
            flex: 1;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .decks {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        .deck {
            flex: 1;
            background: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .deck .header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .deck .header .status {
            color: #1DB954;
        }

        .deck .waveform {
            flex: 1;
            background: #0A0A0A;
            border-radius: 8px;
            border: 1px solid #2A2A2A;
            min-height: 60px;
            position: relative;
            overflow: hidden;
        }

        .deck .waveform canvas {
            width: 100%;
            height: 100%;
        }

        .deck .waveform .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #1DB954;
            left: 0;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .deck .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .deck .controls button {
            padding: 4px 12px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .deck .controls button:hover {
            border-color: #666;
            color: #fff;
        }

        .deck .controls button.play {
            background: #1DB954;
            border-color: #1DB954;
            color: #fff;
            font-weight: 600;
        }

        .deck .controls button.play:hover {
            background: #1ED760;
        }

        .deck .controls input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2A2A2A;
            border-radius: 2px;
            outline: none;
            min-width: 50px;
        }

        .deck .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .deck .controls .time {
            color: #666;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
        }

        .deck .track-info {
            margin-top: 8px;
            padding: 6px 10px;
            background: #0A0A0A;
            border-radius: 6px;
            border: 1px solid #2A2A2A;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .deck .track-info .name {
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck .track-info .name.empty {
            color: #666;
        }

        .deck .track-info .duration {
            color: #666;
            flex-shrink: 0;
        }

        .mixer {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            background: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .mixer .crossfader {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .mixer .crossfader label {
            color: #666;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .mixer .crossfader input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2A2A2A;
            border-radius: 2px;
            outline: none;
        }

        .mixer .crossfader input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .mixer .mixer-btns {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mixer .mixer-btns button {
            padding: 4px 12px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .mixer .mixer-btns button:hover {
            border-color: #666;
            color: #fff;
        }

        .mixer .mixer-btns button.active {
            border-color: #1DB954;
            color: #1DB954;
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 768px) {
            .decks {
                flex-direction: column;
            }
            .topbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .dj-container {
                padding: 12px;
            }
            .deck {
                padding: 12px 14px;
                min-height: 180px;
            }
            .mixer {
                flex-wrap: wrap;
                padding: 12px 16px;
            }
            .login-box {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    LOGIN / REGISTO
    ============================================ -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>Lúcio<span>.fm</span></h1>
            <p class="sub" id="pageSubtitle">DJ Studio</p>

            <!-- FORMULÁRIO DE LOGIN -->
            <div id="loginFormContainer">
                <form id="loginForm">
                    <div class="field">
                        <label for="loginUsername">Utilizador</label>
                        <input type="text" id="loginUsername" placeholder="Ex: DJ_Lucio" required />
                    </div>
                    <div class="field">
                        <label for="loginPassword">Palavra-passe</label>
                        <input type="password" id="loginPassword" placeholder="Palavra-passe" required />
                    </div>

                    <div class="msg error" id="loginErrorMsg">
                        <span id="loginErrorText">Erro</span>
                    </div>
                    <div class="msg success" id="loginSuccessMsg">
                        <span id="loginSuccessText">Sucesso</span>
                    </div>

                    <button type="submit" class="btn" id="loginBtn">
                        <span id="loginBtnText">Entrar</span>
                    </button>

                    <span class="toggle-link" id="showRegisterBtn">Não tens conta? Criar conta</span>

                    <div class="divider">ou</div>

                    <button type="button" class="btn-secondary" id="guestBtn">Entrar como convidado</button>
                </form>
            </div>

            <!-- FORMULÁRIO DE REGISTO -->
            <div id="registerFormContainer" style="display:none;">
                <form id="registerForm">
                    <div class="form-title">📝 Criar Conta</div>

                    <div class="field">
                        <label for="regNome">Nome completo</label>
                        <input type="text" id="regNome" placeholder="Ex: João Silva" required />
                    </div>

                    <div class="field">
                        <label for="regUsername">Nome de utilizador</label>
                        <input type="text" id="regUsername" placeholder="Ex: DJ_Lucio" required />
                    </div>

                    <div class="field">
                        <label for="regIdade">Idade</label>
                        <input type="number" id="regIdade" placeholder="Ex: 25" min="12" max="120" required />
                    </div>

                    <div class="field">
                        <label for="regGmail">Email</label>
                        <input type="email" id="regGmail" placeholder="exemplo@gmail.com" required />
                    </div>

                    <div class="field">
                        <label for="regPassword">Palavra-passe</label>
                        <input type="password" id="regPassword" placeholder="Mínimo 6 caracteres" required minlength="6" />
                    </div>

                    <div class="field">
                        <label for="regConfirmPassword">Confirmar palavra-passe</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirme a palavra-passe" required />
                    </div>

                    <div class="msg error" id="registerErrorMsg">
                        <span id="registerErrorText">Erro</span>
                    </div>
                    <div class="msg success" id="registerSuccessMsg">
                        <span id="registerSuccessText">Sucesso</span>
                    </div>

                    <button type="submit" class="btn" id="registerBtn">
                        <span id="registerBtnText">Criar Conta</span>
                    </button>

                    <span class="toggle-link" id="showLoginBtn">← Voltar para o login</span>
                </form>
            </div>
        </div>
    </div>

    <!-- ============================================
    APP - DJ STUDIO
    ============================================ -->
    <div id="app">
        <div class="topbar">
            <div class="brand">Lúcio<span>.fm</span></div>
            <div class="right">
                <button class="import-btn" id="importBtn">📁 Importar</button>
                <span class="user-name" id="userName">Utilizador</span>
                <div class="avatar" id="userAvatar">U</div>
                <button class="logout-btn" id="logoutBtn">Sair</button>
            </div>
        </div>

        <div class="dj-container">
            <div class="decks">
                <div class="deck" id="deckA">
                    <div class="header">
                        <span>🎧 Deck A</span>
                        <span class="status" id="statusA">⏸ Parado</span>
                    </div>
                    <div class="waveform" id="waveformA">
                        <canvas id="canvasA"></canvas>
                        <div class="playhead" id="playheadA" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="play" id="playA">▶</button>
                        <button id="stopA">⏹</button>
                        <span style="color:#666;font-size:11px;">🔊</span>
                        <input type="range" id="volumeA" min="0" max="100" value="80" />
                        <span style="color:#666;font-size:11px;">⚡</span>
                        <input type="range" id="speedA" min="50" max="150" value="100" />
                        <span class="time" id="timeA">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="name empty" id="trackNameA">Nenhuma música</span>
                        <span class="duration" id="trackDurationA">--:--</span>
                    </div>
                </div>

                <div class="deck" id="deckB">
                    <div class="header">
                        <span>🎧 Deck B</span>
                        <span class="status" id="statusB">⏸ Parado</span>
                    </div>
                    <div class="waveform" id="waveformB">
                        <canvas id="canvasB"></canvas>
                        <div class="playhead" id="playheadB" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="play" id="playB">▶</button>
                        <button id="stopB">⏹</button>
                        <span style="color:#666;font-size:11px;">🔊</span>
                        <input type="range" id="volumeB" min="0" max="100" value="80" />
                        <span style="color:#666;font-size:11px;">⚡</span>
                        <input type="range" id="speedB" min="50" max="150" value="100" />
                        <span class="time" id="timeB">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="name empty" id="trackNameB">Nenhuma música</span>
                        <span class="duration" id="trackDurationB">--:--</span>
                    </div>
                </div>
            </div>

            <div class="mixer">
                <div class="crossfader">
                    <label>A</label>
                    <input type="range" id="crossfader" min="0" max="100" value="50" />
                    <label>B</label>
                </div>
                <div class="mixer-btns">
                    <button id="syncBtn">🔄 Sync</button>
                    <button id="effectBtn">🎛 Efeitos</button>
                    <span style="color:#666;font-size:13px;font-family:monospace;" id="masterVolume">-6dB</span>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="audio/*" multiple />
    </div>

    <!-- ============================================
    SCRIPT
    ============================================ -->
    <script>
        // ============================================
        // SUPABASE CONFIG
        // ============================================
        const SUPABASE_URL = 'https://hijrhoujydouxkvwupgw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FrehZQeVQthZW9uQSpAyqg_acRKGIQo';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // DOM REFS
        // ============================================
        const $ = id => document.getElementById(id);

        // Login
        const loginScreen = $('loginScreen');
        const app = $('app');
        const loginForm = $('loginForm');
        const loginFormContainer = $('loginFormContainer');
        const registerFormContainer = $('registerFormContainer');
        const loginUsername = $('loginUsername');
        const loginPassword = $('loginPassword');
        const loginBtn = $('loginBtn');
        const loginBtnText = $('loginBtnText');
        const loginErrorMsg = $('loginErrorMsg');
        const loginErrorText = $('loginErrorText');
        const loginSuccessMsg = $('loginSuccessMsg');
        const loginSuccessText = $('loginSuccessText');
        const showRegisterBtn = $('showRegisterBtn');
        const showLoginBtn = $('showLoginBtn');
        const guestBtn = $('guestBtn');
        const logoutBtn = $('logoutBtn');
        const userName = $('userName');
        const userAvatar = $('userAvatar');
        const pageSubtitle = $('pageSubtitle');

        // Registo
        const registerForm = $('registerForm');
        const regNome = $('regNome');
        const regUsername = $('regUsername');
        const regIdade = $('regIdade');
        const regGmail = $('regGmail');
        const regPassword = $('regPassword');
        const regConfirmPassword = $('regConfirmPassword');
        const registerBtn = $('registerBtn');
        const registerBtnText = $('registerBtnText');
        const registerErrorMsg = $('registerErrorMsg');
        const registerErrorText = $('registerErrorText');
        const registerSuccessMsg = $('registerSuccessMsg');
        const registerSuccessText = $('registerSuccessText');

        let currentUser = null;

        // ============================================
        // MOSTRA/ESCONDE FORMULÁRIOS
        // ============================================
        function showLoginForm() {
            loginFormContainer.style.display = 'block';
            registerFormContainer.style.display = 'none';
            pageSubtitle.textContent = 'DJ Studio';
            // Limpa mensagens
            loginErrorMsg.classList.remove('show');
            loginSuccessMsg.classList.remove('show');
            registerErrorMsg.classList.remove('show');
            registerSuccessMsg.classList.remove('show');
        }

        function showRegisterForm() {
            loginFormContainer.style.display = 'none';
            registerFormContainer.style.display = 'block';
            pageSubtitle.textContent = 'Criar nova conta';
            // Limpa mensagens
            loginErrorMsg.classList.remove('show');
            loginSuccessMsg.classList.remove('show');
            registerErrorMsg.classList.remove('show');
            registerSuccessMsg.classList.remove('show');
        }

        // ============================================
        // MENSAGENS
        // ============================================
        function showLoginError(msg) {
            loginErrorText.textContent = msg;
            loginErrorMsg.classList.add('show');
            loginSuccessMsg.classList.remove('show');
            setTimeout(() => loginErrorMsg.classList.remove('show'), 5000);
        }

        function showLoginSuccess(msg) {
            loginSuccessText.textContent = msg;
            loginSuccessMsg.classList.add('show');
            loginErrorMsg.classList.remove('show');
            setTimeout(() => loginSuccessMsg.classList.remove('show'), 5000);
        }

        function showRegisterError(msg) {
            registerErrorText.textContent = msg;
            registerErrorMsg.classList.add('show');
            registerSuccessMsg.classList.remove('show');
            setTimeout(() => registerErrorMsg.classList.remove('show'), 5000);
        }

        function showRegisterSuccess(msg) {
            registerSuccessText.textContent = msg;
            registerSuccessMsg.classList.add('show');
            registerErrorMsg.classList.remove('show');
            setTimeout(() => registerSuccessMsg.classList.remove('show'), 5000);
        }

        function setLoginLoading(loading) {
            loginBtn.disabled = loading;
            loginBtnText.textContent = loading ? 'A processar…' : 'Entrar';
        }

        function setRegisterLoading(loading) {
            registerBtn.disabled = loading;
            registerBtnText.textContent = loading ? 'A criar conta…' : 'Criar Conta';
        }

        // ============================================
        // ENTRAR NA APP
        // ============================================
        function enterApp(username) {
            console.log('🚀 A entrar como:', username);

            userName.textContent = username;
            userAvatar.textContent = username.charAt(0).toUpperCase();

            loginScreen.classList.add('hidden');
            app.classList.add('visible');

            // Redimensiona canvases
            setTimeout(() => {
                if (deckA) deckA.resize();
                if (deckB) deckB.resize();
            }, 300);

            console.log('✅ App visível!');
        }

        // ============================================
        // LOGIN
        // ============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = loginUsername.value.trim();
            const password = loginPassword.value.trim();

            if (!username || !password) {
                showLoginError('Preencha todos os campos.');
                return;
            }

            setLoginLoading(true);

            try {
                const email = username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@lucio.fm';

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                if (data.user) {
                    currentUser = data.user;
                    const displayName = data.user.user_metadata?.nome || username;
                    showLoginSuccess('✅ Login bem-sucedido!');
                    setTimeout(() => enterApp(displayName), 500);
                }
            } catch (err) {
                console.error('Erro de login:', err);
                if (err.message.includes('Invalid login credentials')) {
                    showLoginError('❌ Utilizador ou palavra-passe incorretos.');
                } else {
                    showLoginError('❌ Erro: ' + err.message);
                }
            }

            setLoginLoading(false);
        });

        // ============================================
        // REGISTO - COM TODOS OS CAMPOS
        // ============================================
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = regNome.value.trim();
            const username = regUsername.value.trim();
            const idade = regIdade.value.trim();
            const gmail = regGmail.value.trim();
            const password = regPassword.value.trim();
            const confirmPassword = regConfirmPassword.value.trim();

            // Validações
            if (!nome || !username || !idade || !gmail || !password || !confirmPassword) {
                showRegisterError('⚠️ Preencha todos os campos.');
                return;
            }

            if (password.length < 6) {
                showRegisterError('⚠️ A palavra-passe deve ter pelo menos 6 caracteres.');
                return;
            }

            if (password !== confirmPassword) {
                showRegisterError('⚠️ As palavras-passe não coincidem.');
                return;
            }

            if (parseInt(idade) < 12 || parseInt(idade) > 120) {
                showRegisterError('⚠️ Idade inválida. Deve ser entre 12 e 120 anos.');
                return;
            }

            if (!gmail.includes('@')) {
                showRegisterError('⚠️ Email inválido.');
                return;
            }

            setRegisterLoading(true);

            try {
                // Cria o email a partir do username
                const email = username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@lucio.fm';

                console.log('📝 A criar conta para:', { nome, username, idade, gmail, email });

                // 1. Cria o utilizador na autenticação do Supabase
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            nome: nome,
                            username: username,
                            idade: parseInt(idade),
                            gmail: gmail
                        }
                    }
                });

                if (authError) throw authError;

                if (authData.user) {
                    console.log('✅ Utilizador criado na autenticação:', authData.user.id);

                    // 2. Guarda os dados adicionais na tabela 'users' (se existir)
                    try {
                        const { error: insertError } = await supabase
                            .from('users')
                            .insert([{
                                id: authData.user.id,
                                nome: nome,
                                username: username,
                                idade: parseInt(idade),
                                gmail: gmail,
                                created_at: new Date().toISOString()
                            }]);

                        if (insertError) {
                            console.warn('⚠️ Erro ao inserir na tabela users:', insertError);
                            // Não falha o registo, apenas avisa
                        } else {
                            console.log('✅ Dados guardados na tabela users');
                        }
                    } catch (dbError) {
                        console.warn('⚠️ Tabela users pode não existir:', dbError);
                        // A tabela pode não existir, mas o registo já foi feito
                    }

                    showRegisterSuccess('✅ Conta criada com sucesso! Faça login.');
                    registerForm.reset();

                    // Volta para o login após 2 segundos
                    setTimeout(() => {
                        showLoginForm();
                        // Preenche o username no login
                        loginUsername.value = username;
                        showLoginSuccess('✅ Conta criada! Faça login com as suas credenciais.');
                    }, 2000);
                }
            } catch (err) {
                console.error('❌ Erro no registo:', err);
                if (err.message.includes('User already registered')) {
                    showRegisterError('❌ Este nome de utilizador já está registado.');
                } else if (err.message.includes('Password should be at least 6 characters')) {
                    showRegisterError('❌ A palavra-passe deve ter pelo menos 6 caracteres.');
                } else {
                    showRegisterError('❌ Erro: ' + err.message);
                }
            }

            setRegisterLoading(false);
        });

        // ============================================
        // ALTERNAR ENTRE LOGIN E REGISTO
        // ============================================
        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showRegisterForm();
        });

        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showLoginForm();
        });

        // ============================================
        // BOTÃO CONVIDADO
        // ============================================
        guestBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const nome = 'Convidado_' + Math.floor(Math.random() * 10000);
            enterApp(nome);
        });

        // ============================================
        // LOGOUT
        // ============================================
        logoutBtn.addEventListener('click', async () => {
            try {
                if (currentUser && !currentUser.id.startsWith('guest_')) {
                    await supabase.auth.signOut();
                }
                currentUser = null;
                app.classList.remove('visible');
                setTimeout(() => {
                    loginScreen.classList.remove('hidden');
                    loginUsername.value = '';
                    loginPassword.value = '';
                    showLoginForm();
                }, 300);
            } catch (err) {
                console.error('Erro ao sair:', err);
            }
        });

        // ============================================
        // VERIFICAR SESSÃO
        // ============================================
        async function checkSession() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (data.session) {
                    currentUser = data.session.user;
                    const nome = currentUser.user_metadata?.nome || currentUser.user_metadata?.username || 'DJ_Lucio';
                    enterApp(nome);
                }
            } catch (err) {
                console.error('Erro ao verificar sessão:', err);
            }
        }

        // ============================================
        // AUDIO DECK
        // ============================================
        class AudioDeck {
            constructor(canvas, playhead, playBtn, stopBtn, volumeSlider, speedSlider, timeDisplay, trackNameEl,
                trackDurationEl, statusEl) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.playhead = playhead;
                this.playBtn = playBtn;
                this.stopBtn = stopBtn;
                this.volumeSlider = volumeSlider;
                this.speedSlider = speedSlider;
                this.timeDisplay = timeDisplay;
                this.trackNameEl = trackNameEl;
                this.trackDurationEl = trackDurationEl;
                this.statusEl = statusEl;

                this.audioCtx = null;
                this.buffer = null;
                this.source = null;
                this.gain = null;
                this.isPlaying = false;
                this.pausedAt = 0;
                this.startTime = 0;
                this.duration = 0;
                this.animId = null;
                this.waveform = [];
                this.speed = 1;
                this.volume = 0.8;

                this.resize();
                this.bindEvents();
            }

            bindEvents() {
                this.playBtn.onclick = () => this.toggle();
                this.stopBtn.onclick = () => this.stop();
                this.volumeSlider.oninput = (e) => {
                    this.volume = e.target.value / 100;
                    if (this.gain) this.gain.gain.value = this.volume;
                };
                this.speedSlider.oninput = (e) => {
                    this.speed = e.target.value / 100;
                    if (this.source && this.isPlaying) {
                        this.source.playbackRate.value = this.speed;
                    }
                };
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width - 4 || 300;
                this.canvas.height = rect.height - 4 || 60;
                this.draw();
            }

            async load(file) {
                this.stop();
                this.buffer = null;
                this.waveform = [];

                if (!this.audioCtx) {
                    this.audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }

                const data = await file.arrayBuffer();
                this.buffer = await this.audioCtx.decodeAudioData(data);
                this.duration = this.buffer.duration;

                const channel = this.buffer.getChannelData(0);
                const samples = 150;
                this.waveform = [];
                const step = Math.floor(channel.length / samples);
                for (let i = 0; i < samples; i++) {
                    let sum = 0;
                    for (let j = 0; j < step; j++) {
                        sum += Math.abs(channel[i * step + j] || 0);
                    }
                    this.waveform.push(sum / step);
                }

                this.trackNameEl.textContent = file.name;
                this.trackNameEl.className = 'name';
                this.trackDurationEl.textContent = this.format(this.duration);
                this.statusEl.textContent = '⏸ Carregado';
                this.updateTime(0);
                this.draw();
                return true;
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                ctx.clearRect(0, 0, w, h);

                if (this.waveform.length === 0) {
                    ctx.fillStyle = '#333';
                    ctx.font = '13px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Carregue uma música', w / 2, h / 2 + 4);
                    return;
                }

                const barW = Math.max(2, w / this.waveform.length - 2);
                const centerY = h / 2;

                for (let i = 0; i < this.waveform.length; i++) {
                    const val = this.waveform[i];
                    const height = Math.max(2, val * h * 0.75);
                    const x = i * (barW + 2);

                    const grad = ctx.createLinearGradient(0, centerY - height / 2, 0, centerY + height / 2);
                    grad.addColorStop(0, 'rgba(29, 185, 84, 0.3)');
                    grad.addColorStop(0.5, 'rgba(29, 185, 84, 0.8)');
                    grad.addColorStop(1, 'rgba(29, 185, 84, 0.3)');

                    ctx.fillStyle = grad;
                    ctx.fillRect(x, centerY - height / 2, barW, height);
                }
            }

            toggle() {
                if (!this.buffer) {
                    this.statusEl.textContent = '⚠️ Sem música';
                    return;
                }
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                if (!this.buffer || !this.audioCtx) return;

                this.source = this.audioCtx.createBufferSource();
                this.source.buffer = this.buffer;
                this.source.playbackRate.value = this.speed;

                this.gain = this.audioCtx.createGain();
                this.gain.gain.value = this.volume;

                this.source.connect(this.gain);
                this.gain.connect(this.audioCtx.destination);

                const offset = this.pausedAt || 0;
                this.source.start(0, offset);
                this.startTime = this.audioCtx.currentTime - offset;
                this.isPlaying = true;
                this.pausedAt = 0;

                this.playBtn.textContent = '⏸';
                this.playBtn.classList.add('play');
                this.statusEl.textContent = '▶ A tocar';

                this.updateProgress();
            }

            pause() {
                if (!this.isPlaying) return;
                this.pausedAt = this.audioCtx.currentTime - this.startTime;
                this.source.stop();
                this.source = null;
                this.isPlaying = false;
                this.playBtn.textContent = '▶';
                this.statusEl.textContent = '⏸ Pausa';

                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }

            stop() {
                if (this.isPlaying) {
                    this.source.stop();
                    this.source = null;
                    this.isPlaying = false;
                    this.pausedAt = 0;
                }
                this.playBtn.textContent = '▶';
                this.statusEl.textContent = '⏹ Parado';
                this.updateTime(0);
                this.playhead.style.left = '0%';

                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }

            updateProgress() {
                if (!this.isPlaying) return;

                const current = this.audioCtx.currentTime - this.startTime;
                const progress = Math.min(current / this.duration, 1);

                this.updateTime(current);
                this.playhead.style.left = (progress * 100) + '%';

                if (progress >= 1) {
                    this.stop();
                    return;
                }

                this.animId = requestAnimationFrame(() => this.updateProgress());
            }

            updateTime(current) {
                this.timeDisplay.textContent = this.format(current) + ' / ' + this.format(this.duration);
            }

            format(secs) {
                if (!secs || isNaN(secs)) return '00:00';
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60);
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
        }

        // ============================================
        // INICIAR DECKS
        // ============================================
        const deckA = new AudioDeck(
            $('canvasA'), $('playheadA'), $('playA'), $('stopA'),
            $('volumeA'), $('speedA'), $('timeA'),
            $('trackNameA'), $('trackDurationA'), $('statusA')
        );

        const deckB = new AudioDeck(
            $('canvasB'), $('playheadB'), $('playB'), $('stopB'),
            $('volumeB'), $('speedB'), $('timeB'),
            $('trackNameB'), $('trackDurationB'), $('statusB')
        );

        const decks = [deckA, deckB];
        let deckIndex = 0;

        // ============================================
        // IMPORTAR MÚSICA
        // ============================================
        $('importBtn').onclick = () => $('fileInput').click();

        $('fileInput').onchange = async (e) => {
            const files = e.target.files;
            for (const file of files) {
                const deck = decks[deckIndex];
                await deck.load(file);
                deckIndex = (deckIndex + 1) % decks.length;
            }
            e.target.value = '';
        };

        // Drag and drop
        document.ondragover = (e) => e.preventDefault();
        document.ondrop = async (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (const file of files) {
                if (file.type.startsWith('audio/')) {
                    const deck = decks[deckIndex];
                    await deck.load(file);
                    deckIndex = (deckIndex + 1) % decks.length;
                }
            }
        };

        // ============================================
        // CROSSFADER
        // ============================================
        $('crossfader').oninput = (e) => {
            const val = e.target.value / 100;
            if (deckA.gain) {
                deckA.gain.gain.value = (val < 0.5) ? deckA.volume : deckA.volume * (1 - val * 2);
            }
            if (deckB.gain) {
                deckB.gain.gain.value = (val > 0.5) ? deckB.volume : deckB.volume * (val * 2);
            }
        };

        // ============================================
        // SYNC
        // ============================================
        $('syncBtn').onclick = function() {
            if (deckA.isPlaying && deckB.isPlaying) {
                const current = deckA.audioCtx.currentTime - deckA.startTime;
                deckB.pause();
                deckB.pausedAt = current;
                deckB.play();
                this.classList.toggle('active');
            }
        };

        // ============================================
        // EFFECTS
        // ============================================
        let effects = false;
        $('effectBtn').onclick = function() {
            effects = !effects;
            this.classList.toggle('active');
            $('masterVolume').textContent = effects ? '+3dB' : '-6dB';
            if (deckA.source) {
                deckA.source.playbackRate.value = effects ? deckA.speed * 1.05 : deckA.speed;
            }
            if (deckB.source) {
                deckB.source.playbackRate.value = effects ? deckB.speed * 1.05 : deckB.speed;
            }
        };

        // ============================================
        // REDIMENSIONAR
        // ============================================
        window.addEventListener('resize', () => {
            deckA.resize();
            deckB.resize();
        });

        // ============================================
        // INICIAR
        // ============================================
        showLoginForm();
        checkSession();

        console.log('🎵 Lúcio.fm — DJ Studio');
        console.log('📝 Para criar conta:');
        console.log('   1. Clica em "Não tens conta? Criar conta"');
        console.log('   2. Preenche: Nome, Utilizador, Idade, Email, Palavra-passe');
        console.log('   3. Clica em "Criar Conta"');
        console.log('   4. Depois faz login com as tuas credenciais');
        console.log('');
        console.log('👤 Ou clica em "Entrar como convidado" para testar');
        console.log('📁 Arraste músicas ou clique em "Importar"');
    </script>
