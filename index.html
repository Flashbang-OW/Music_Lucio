<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lúcio.fm - DJ Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #FFFFFF;
            height: 100vh;
            overflow: hidden;
        }

        /* ============================================
                   LOGIN - SEMPRE VISÍVEL INICIALMENTE
                   ============================================ */
        #loginScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0A0A0A;
            z-index: 1000;
        }

        #loginScreen.hidden {
            display: none !important;
        }

        .login-box {
            background: #141414;
            border-radius: 12px;
            padding: 40px 32px;
            width: 380px;
            max-width: 90%;
            border: 1px solid #2A2A2A;
        }

        .login-box h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 4px;
        }

        .login-box h1 span {
            color: #1DB954;
        }

        .login-box .sub {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 14px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 14px;
            outline: none;
        }

        .login-box input:focus {
            border-color: #1DB954;
        }

        .login-box .btn {
            width: 100%;
            padding: 12px;
            background: #1DB954;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-box .btn:hover {
            background: #1ED760;
        }

        .login-box .btn-ghost {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #2A2A2A;
            border-radius: 8px;
            color: #B0B0B0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-box .btn-ghost:hover {
            border-color: #666;
            color: #fff;
        }

        .login-box .toggle {
            display: block;
            text-align: center;
            color: #666;
            font-size: 14px;
            margin: 16px 0 20px 0;
            cursor: pointer;
        }

        .login-box .toggle:hover {
            color: #fff;
        }

        .login-box .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: #666;
            font-size: 13px;
        }

        .login-box .divider::before,
        .login-box .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2A2A2A;
        }

        .login-box .msg {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 14px;
        }

        .login-box .msg.show {
            display: block;
        }

        .login-box .msg.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #F87171;
        }

        .login-box .msg.success {
            background: rgba(29, 185, 84, 0.15);
            border: 1px solid rgba(29, 185, 84, 0.3);
            color: #1DB954;
        }

        .login-box .field.hidden {
            display: none;
        }

        /* ============================================
                   APP - INICIALMENTE ESCONDIDA
                   ============================================ */
        #app {
            display: none !important;
            height: 100vh;
            flex-direction: column;
            background: #0A0A0A;
        }

        #app.visible {
            display: flex !important;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #141414;
            border-bottom: 1px solid #2A2A2A;
            flex-shrink: 0;
        }

        .topbar .brand {
            font-size: 18px;
            font-weight: 700;
        }

        .topbar .brand span {
            color: #1DB954;
        }

        .topbar .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar .import-btn {
            padding: 6px 16px;
            background: #1DB954;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .topbar .import-btn:hover {
            background: #1ED760;
        }

        .topbar .user-name {
            color: #B0B0B0;
            font-size: 13px;
        }

        .topbar .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1DB954;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
        }

        .topbar .logout-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .topbar .logout-btn:hover {
            border-color: #EF4444;
            color: #EF4444;
        }

        /* DJ DECK */
        .dj-container {
            flex: 1;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow: hidden;
        }

        .decks {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        .deck {
            flex: 1;
            background: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .deck .header {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .deck .header .status {
            color: #1DB954;
        }

        .deck .waveform {
            flex: 1;
            background: #0A0A0A;
            border-radius: 8px;
            border: 1px solid #2A2A2A;
            min-height: 60px;
            position: relative;
            overflow: hidden;
        }

        .deck .waveform canvas {
            width: 100%;
            height: 100%;
        }

        .deck .waveform .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #1DB954;
            left: 0;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .deck .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .deck .controls button {
            padding: 4px 12px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .deck .controls button:hover {
            border-color: #666;
            color: #fff;
        }

        .deck .controls button.play {
            background: #1DB954;
            border-color: #1DB954;
            color: #fff;
            font-weight: 600;
        }

        .deck .controls button.play:hover {
            background: #1ED760;
        }

        .deck .controls input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2A2A2A;
            border-radius: 2px;
            outline: none;
            min-width: 50px;
        }

        .deck .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .deck .controls .time {
            color: #666;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
            min-width: 70px;
            text-align: center;
            font-family: monospace;
        }

        .deck .track-info {
            margin-top: 8px;
            padding: 6px 10px;
            background: #0A0A0A;
            border-radius: 6px;
            border: 1px solid #2A2A2A;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .deck .track-info .name {
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck .track-info .name.empty {
            color: #666;
        }

        .deck .track-info .duration {
            color: #666;
            flex-shrink: 0;
        }

        /* MIXER */
        .mixer {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 12px 20px;
            background: #141414;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .mixer .crossfader {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .mixer .crossfader label {
            color: #666;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .mixer .crossfader input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: #2A2A2A;
            border-radius: 2px;
            outline: none;
        }

        .mixer .crossfader input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
        }

        .mixer .mixer-btns {
            display: flex;
            gap: 10px;
        }

        .mixer .mixer-btns button {
            padding: 4px 12px;
            background: #222;
            border: 1px solid #2A2A2A;
            border-radius: 6px;
            color: #B0B0B0;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }

        .mixer .mixer-btns button:hover {
            border-color: #666;
            color: #fff;
        }

        .mixer .mixer-btns button.active {
            border-color: #1DB954;
            color: #1DB954;
        }

        #fileInput {
            display: none;
        }

        @media (max-width: 768px) {
            .decks {
                flex-direction: column;
            }
            .topbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .dj-container {
                padding: 12px;
            }
            .deck {
                padding: 12px 14px;
                min-height: 180px;
            }
            .mixer {
                flex-wrap: wrap;
                padding: 12px 16px;
            }
            .login-box {
                padding: 24px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
    LOGIN
    ============================================ -->
    <div id="loginScreen">
        <div class="login-box">
            <h1>Lúcio<span>.fm</span></h1>
            <p class="sub">DJ Studio</p>

            <form id="loginForm">
                <input type="text" id="username" placeholder="Utilizador" required />
                <input type="password" id="password" placeholder="Palavra-passe" required minlength="6" />

                <div id="confirmGroup" class="field hidden">
                    <input type="password" id="confirmPassword" placeholder="Confirmar palavra-passe" />
                </div>

                <div id="emailGroup" class="field hidden">
                    <input type="email" id="email" placeholder="Email (opcional)" />
                </div>

                <div class="msg error" id="errorMsg">
                    <span id="errorText">Erro</span>
                </div>
                <div class="msg success" id="successMsg">
                    <span id="successText">Sucesso</span>
                </div>

                <button type="submit" class="btn" id="loginBtn">
                    <span id="loginBtnText">Entrar</span>
                </button>

                <span class="toggle" id="toggleMode">Criar conta</span>

                <div class="divider">ou</div>

                <!-- BOTÃO CONVIDADO - COM ID ÚNICO E SIMPLES -->
                <button type="button" class="btn-ghost" id="btnGuest">Entrar como convidado</button>
            </form>
        </div>
    </div>

    <!-- ============================================
    APP
    ============================================ -->
    <div id="app">
        <!-- Top Bar -->
        <div class="topbar">
            <div class="brand">Lúcio<span>.fm</span></div>
            <div class="right">
                <button class="import-btn" id="importBtn">📁 Importar</button>
                <span class="user-name" id="userName">Utilizador</span>
                <div class="avatar" id="userAvatar">U</div>
                <button class="logout-btn" id="logoutBtn">Sair</button>
            </div>
        </div>

        <!-- DJ -->
        <div class="dj-container">
            <div class="decks">
                <!-- Deck A -->
                <div class="deck" id="deckA">
                    <div class="header">
                        <span>🎧 Deck A</span>
                        <span class="status" id="statusA">⏸ Parado</span>
                    </div>
                    <div class="waveform" id="waveformA">
                        <canvas id="canvasA"></canvas>
                        <div class="playhead" id="playheadA" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="play" id="playA">▶</button>
                        <button id="stopA">⏹</button>
                        <span style="color:#666;font-size:11px;">🔊</span>
                        <input type="range" id="volumeA" min="0" max="100" value="80" />
                        <span style="color:#666;font-size:11px;">⚡</span>
                        <input type="range" id="speedA" min="50" max="150" value="100" />
                        <span class="time" id="timeA">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="name empty" id="trackNameA">Nenhuma música</span>
                        <span class="duration" id="trackDurationA">--:--</span>
                    </div>
                </div>

                <!-- Deck B -->
                <div class="deck" id="deckB">
                    <div class="header">
                        <span>🎧 Deck B</span>
                        <span class="status" id="statusB">⏸ Parado</span>
                    </div>
                    <div class="waveform" id="waveformB">
                        <canvas id="canvasB"></canvas>
                        <div class="playhead" id="playheadB" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="play" id="playB">▶</button>
                        <button id="stopB">⏹</button>
                        <span style="color:#666;font-size:11px;">🔊</span>
                        <input type="range" id="volumeB" min="0" max="100" value="80" />
                        <span style="color:#666;font-size:11px;">⚡</span>
                        <input type="range" id="speedB" min="50" max="150" value="100" />
                        <span class="time" id="timeB">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="name empty" id="trackNameB">Nenhuma música</span>
                        <span class="duration" id="trackDurationB">--:--</span>
                    </div>
                </div>
            </div>

            <!-- Mixer -->
            <div class="mixer">
                <div class="crossfader">
                    <label>A</label>
                    <input type="range" id="crossfader" min="0" max="100" value="50" />
                    <label>B</label>
                </div>
                <div class="mixer-btns">
                    <button id="syncBtn">🔄 Sync</button>
                    <button id="effectBtn">🎛 Efeitos</button>
                    <span style="color:#666;font-size:13px;font-family:monospace;" id="masterVolume">-6dB</span>
                </div>
            </div>
        </div>

        <input type="file" id="fileInput" accept="audio/*" multiple />
    </div>

    <!-- ============================================
    SCRIPT - VERSÃO SIMPLES E TESTADA
    ============================================ -->
    <script>
        // ============================================
        // FUNÇÃO PRINCIPAL - ENTRAR NA APP
        // ============================================
        function entrarApp(username) {
            console.log('🚀 A entrar como:', username);

            // Atualiza o nome do utilizador
            document.getElementById('userName').textContent = username;
            document.getElementById('userAvatar').textContent = username.charAt(0).toUpperCase();

            // ESCONDE O LOGIN
            document.getElementById('loginScreen').classList.add('hidden');

            // MOSTRA A APP
            document.getElementById('app').classList.add('visible');

            console.log('✅ App visível! Login escondido!');
        }

        // ============================================
        // BOTÃO CONVIDADO - O MAIS SIMPLES POSSÍVEL
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Página carregada!');

            // Botão convidado
            var guestBtn = document.getElementById('btnGuest');
            if (guestBtn) {
                console.log('✅ Botão convidado encontrado!');

                guestBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('👤 CLICOU NO BOTÃO CONVIDADO!');

                    var nome = 'Convidado_' + Math.floor(Math.random() * 10000);
                    console.log('👤 Nome gerado:', nome);

                    // CHAMA A FUNÇÃO
                    entrarApp(nome);
                });
            } else {
                console.log('❌ Botão convidado NÃO encontrado!');
            }
        });

        // ============================================
        // TESTE RÁPIDO - Botão de emergência
        // ============================================
        // Se o botão normal não funcionar, este atalho no console vai funcionar
        console.log('💡 Se o botão não funcionar, escreve no console: entrarApp("Teste")');
        console.log('💡 Ou clica com o botão direito no botão e escolhe "Inspecionar" para veres o ID');

        // ============================================
        // AUDIO DECK (SIMPLIFICADO)
        // ============================================
        class AudioDeck {
            constructor(canvas, playhead, playBtn, stopBtn, volumeSlider, speedSlider, timeDisplay, trackNameEl,
                trackDurationEl, statusEl) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.playhead = playhead;
                this.playBtn = playBtn;
                this.stopBtn = stopBtn;
                this.volumeSlider = volumeSlider;
                this.speedSlider = speedSlider;
                this.timeDisplay = timeDisplay;
                this.trackNameEl = trackNameEl;
                this.trackDurationEl = trackDurationEl;
                this.statusEl = statusEl;

                this.audioCtx = null;
                this.buffer = null;
                this.source = null;
                this.gain = null;
                this.isPlaying = false;
                this.pausedAt = 0;
                this.startTime = 0;
                this.duration = 0;
                this.animId = null;
                this.waveform = [];
                this.speed = 1;
                this.volume = 0.8;

                this.resize();
                this.bindEvents();
            }

            bindEvents() {
                this.playBtn.onclick = () => this.toggle();
                this.stopBtn.onclick = () => this.stop();
                this.volumeSlider.oninput = (e) => {
                    this.volume = e.target.value / 100;
                    if (this.gain) this.gain.gain.value = this.volume;
                };
                this.speedSlider.oninput = (e) => {
                    this.speed = e.target.value / 100;
                    if (this.source && this.isPlaying) {
                        this.source.playbackRate.value = this.speed;
                    }
                };
            }

            resize() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width - 4 || 300;
                this.canvas.height = rect.height - 4 || 60;
                this.draw();
            }

            async load(file) {
                this.stop();
                this.buffer = null;
                this.waveform = [];

                if (!this.audioCtx) {
                    this.audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }

                const data = await file.arrayBuffer();
                this.buffer = await this.audioCtx.decodeAudioData(data);
                this.duration = this.buffer.duration;

                const channel = this.buffer.getChannelData(0);
                const samples = 150;
                this.waveform = [];
                const step = Math.floor(channel.length / samples);
                for (let i = 0; i < samples; i++) {
                    let sum = 0;
                    for (let j = 0; j < step; j++) {
                        sum += Math.abs(channel[i * step + j] || 0);
                    }
                    this.waveform.push(sum / step);
                }

                this.trackNameEl.textContent = file.name;
                this.trackNameEl.className = 'name';
                this.trackDurationEl.textContent = this.format(this.duration);
                this.statusEl.textContent = '⏸ Carregado';
                this.updateTime(0);
                this.draw();
                return true;
            }

            draw() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                ctx.clearRect(0, 0, w, h);

                if (this.waveform.length === 0) {
                    ctx.fillStyle = '#333';
                    ctx.font = '13px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Carregue uma música', w / 2, h / 2 + 4);
                    return;
                }

                const barW = Math.max(2, w / this.waveform.length - 2);
                const centerY = h / 2;

                for (let i = 0; i < this.waveform.length; i++) {
                    const val = this.waveform[i];
                    const height = Math.max(2, val * h * 0.75);
                    const x = i * (barW + 2);

                    const grad = ctx.createLinearGradient(0, centerY - height / 2, 0, centerY + height / 2);
                    grad.addColorStop(0, 'rgba(29, 185, 84, 0.3)');
                    grad.addColorStop(0.5, 'rgba(29, 185, 84, 0.8)');
                    grad.addColorStop(1, 'rgba(29, 185, 84, 0.3)');

                    ctx.fillStyle = grad;
                    ctx.fillRect(x, centerY - height / 2, barW, height);
                }
            }

            toggle() {
                if (!this.buffer) {
                    this.statusEl.textContent = '⚠️ Sem música';
                    return;
                }
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                if (!this.buffer || !this.audioCtx) return;

                this.source = this.audioCtx.createBufferSource();
                this.source.buffer = this.buffer;
                this.source.playbackRate.value = this.speed;

                this.gain = this.audioCtx.createGain();
                this.gain.gain.value = this.volume;

                this.source.connect(this.gain);
                this.gain.connect(this.audioCtx.destination);

                const offset = this.pausedAt || 0;
                this.source.start(0, offset);
                this.startTime = this.audioCtx.currentTime - offset;
                this.isPlaying = true;
                this.pausedAt = 0;

                this.playBtn.textContent = '⏸';
                this.playBtn.classList.add('play');
                this.statusEl.textContent = '▶ A tocar';

                this.updateProgress();
            }

            pause() {
                if (!this.isPlaying) return;
                this.pausedAt = this.audioCtx.currentTime - this.startTime;
                this.source.stop();
                this.source = null;
                this.isPlaying = false;
                this.playBtn.textContent = '▶';
                this.statusEl.textContent = '⏸ Pausa';

                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }

            stop() {
                if (this.isPlaying) {
                    this.source.stop();
                    this.source = null;
                    this.isPlaying = false;
                    this.pausedAt = 0;
                }
                this.playBtn.textContent = '▶';
                this.statusEl.textContent = '⏹ Parado';
                this.updateTime(0);
                this.playhead.style.left = '0%';

                if (this.animId) {
                    cancelAnimationFrame(this.animId);
                    this.animId = null;
                }
            }

            updateProgress() {
                if (!this.isPlaying) return;

                const current = this.audioCtx.currentTime - this.startTime;
                const progress = Math.min(current / this.duration, 1);

                this.updateTime(current);
                this.playhead.style.left = (progress * 100) + '%';

                if (progress >= 1) {
                    this.stop();
                    return;
                }

                this.animId = requestAnimationFrame(() => this.updateProgress());
            }

            updateTime(current) {
                this.timeDisplay.textContent = this.format(current) + ' / ' + this.format(this.duration);
            }

            format(secs) {
                if (!secs || isNaN(secs)) return '00:00';
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60);
                return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }
        }

        // ============================================
        // INICIAR DECKS
        // ============================================
        const deckA = new AudioDeck(
            document.getElementById('canvasA'),
            document.getElementById('playheadA'),
            document.getElementById('playA'),
            document.getElementById('stopA'),
            document.getElementById('volumeA'),
            document.getElementById('speedA'),
            document.getElementById('timeA'),
            document.getElementById('trackNameA'),
            document.getElementById('trackDurationA'),
            document.getElementById('statusA')
        );

        const deckB = new AudioDeck(
            document.getElementById('canvasB'),
            document.getElementById('playheadB'),
            document.getElementById('playB'),
            document.getElementById('stopB'),
            document.getElementById('volumeB'),
            document.getElementById('speedB'),
            document.getElementById('timeB'),
            document.getElementById('trackNameB'),
            document.getElementById('trackDurationB'),
            document.getElementById('statusB')
        );

        const decks = [deckA, deckB];
        let deckIndex = 0;

        // ============================================
        // IMPORTAR
        // ============================================
        document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();

        document.getElementById('fileInput').onchange = async (e) => {
            const files = e.target.files;
            for (const file of files) {
                const deck = decks[deckIndex];
                await deck.load(file);
                deckIndex = (deckIndex + 1) % decks.length;
            }
            e.target.value = '';
        };

        // Drag and drop
        document.ondragover = (e) => e.preventDefault();
        document.ondrop = async (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (const file of files) {
                if (file.type.startsWith('audio/')) {
                    const deck = decks[deckIndex];
                    await deck.load(file);
                    deckIndex = (deckIndex + 1) % decks.length;
                }
            }
        };

        // ============================================
        // CROSSFADER
        // ============================================
        document.getElementById('crossfader').oninput = (e) => {
            const val = e.target.value / 100;
            if (deckA.gain) {
                deckA.gain.gain.value = (val < 0.5) ? deckA.volume : deckA.volume * (1 - val * 2);
            }
            if (deckB.gain) {
                deckB.gain.gain.value = (val > 0.5) ? deckB.volume : deckB.volume * (val * 2);
            }
        };

        // ============================================
        // SYNC
        // ============================================
        document.getElementById('syncBtn').onclick = function() {
            if (deckA.isPlaying && deckB.isPlaying) {
                const current = deckA.audioCtx.currentTime - deckA.startTime;
                deckB.pause();
                deckB.pausedAt = current;
                deckB.play();
                this.classList.toggle('active');
            }
        };

        // ============================================
        // EFFECTS
        // ============================================
        let effects = false;
        document.getElementById('effectBtn').onclick = function() {
            effects = !effects;
            this.classList.toggle('active');
            document.getElementById('masterVolume').textContent = effects ? '+3dB' : '-6dB';
            if (deckA.source) {
                deckA.source.playbackRate.value = effects ? deckA.speed * 1.05 : deckA.speed;
            }
            if (deckB.source) {
                deckB.source.playbackRate.value = effects ? deckB.speed * 1.05 : deckB.speed;
            }
        };

        // ============================================
        // LOGOUT
        // ============================================
        document.getElementById('logoutBtn').onclick = function() {
            document.getElementById('app').classList.remove('visible');
            document.getElementById('loginScreen').classList.remove('hidden');
        };

        // ============================================
        // REDIMENSIONAR
        // ============================================
        window.addEventListener('resize', () => {
            deckA.resize();
            deckB.resize();
        });

        console.log('🎵 Lúcio.fm — DJ Studio');
        console.log('👤 Clique em "Entrar como convidado" para testar');
        console.log('📁 Arraste músicas ou clique em "Importar"');
        console.log('');
        console.log('🔧 Se o botão não funcionar, escreve no console:');
        console.log('   entrarApp("Teste")');
    </script>

</body>
</html>
