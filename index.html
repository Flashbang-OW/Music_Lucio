<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lúcio.fm - Vamos Aumentar o Som!</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ============ VARIÁVEIS TEMÁTICAS ============ */
        :root {
            --lucio-green: #A4D615;
            --lucio-green-dark: #7BA800;
            --lucio-yellow: #F9ED32;
            --overwatch-blue: #218FFE;
            --dark-blue: #0F2343;
            --darker-blue: #091428;
            --overwatch-dark: #1A1A2E;
            --heal-yellow: #FFD700;
            --speed-green: #00FF00;
            --text-white: #FFFFFF;
            --text-gray: #8B9DC3;
            --gradient-lucio: linear-gradient(135deg, var(--lucio-green), var(--lucio-yellow));
            --gradient-overwatch: linear-gradient(135deg, var(--overwatch-blue), var(--lucio-green));
        }

        /* ============ RESET E BASE ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Orbitron', sans-serif;
            background: var(--darker-blue);
            color: var(--text-white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ============ ONDAS SONORAS DE FUNDO ============ */
        .sound-waves {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .wave {
            position: absolute;
            border: 2px solid rgba(164, 214, 21, 0.2);
            border-radius: 50%;
            animation: soundWave 4s infinite;
            opacity: 0;
        }

        .wave1 { width: 300px; height: 300px; top: 20%; left: 30%; animation-delay: 0s; }
        .wave2 { width: 400px; height: 400px; top: 60%; right: 20%; animation-delay: 1s; }
        .wave3 { width: 200px; height: 200px; bottom: 10%; left: 10%; animation-delay: 2s; }
        .wave4 { width: 350px; height: 350px; top: 40%; right: 40%; animation-delay: 3s; }

        @keyframes soundWave {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(2); opacity: 0; }
        }

        /* ============ ECRÃ DE LOGIN ============ */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--darker-blue);
            background-image: 
                radial-gradient(ellipse at 30% 50%, rgba(164, 214, 21, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(249, 237, 50, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(33, 143, 254, 0.15) 0%, transparent 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: all 0.5s ease;
        }

        .login-screen.hidden {
            display: none;
        }

        .login-container {
            text-align: center;
            z-index: 1;
            width: 90%;
            max-width: 420px;
        }

        .lucio-symbol-large {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(164, 214, 21, 0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .login-logo { margin-bottom: 30px; }

        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--text-white);
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(164, 214, 21, 0.6);
            margin-bottom: 5px;
        }

        .login-subtitle {
            color: var(--lucio-green);
            font-size: 18px;
            font-style: italic;
        }

        .login-form { margin-bottom: 25px; }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: var(--lucio-green);
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 15px;
            font-size: 18px;
            z-index: 1;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            background: rgba(15, 35, 67, 0.8);
            border: 2px solid rgba(164, 214, 21, 0.3);
            border-radius: 10px;
            color: var(--text-white);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            border-color: var(--lucio-green);
            box-shadow: 0 0 20px rgba(164, 214, 21, 0.3);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .login-button {
            width: 100%;
            padding: 15px;
            background: var(--gradient-lucio);
            border: none;
            border-radius: 10px;
            color: var(--darker-blue);
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(164, 214, 21, 0.4);
            margin-bottom: 15px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(164, 214, 21, 0.7);
        }

        .login-button:active { transform: translateY(0); }
        .login-button:disabled { opacity: 0.6; cursor: not-allowed; }

        .button-icon {
            font-size: 22px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .login-options {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .login-options a {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
            cursor: pointer;
        }

        .login-options a:hover { color: var(--lucio-green); }

        .divider { color: rgba(255, 255, 255, 0.3); }

        .login-voiceline {
            margin-bottom: 20px;
            min-height: 30px;
        }

        .login-voiceline p {
            color: var(--lucio-green);
            font-style: italic;
            font-size: 16px;
            transition: opacity 0.3s;
        }

        .error-message {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid rgba(255, 0, 0, 0.4);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .error-message.show { display: flex; }

        .success-message {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(164, 214, 21, 0.2);
            border: 1px solid rgba(164, 214, 21, 0.4);
            color: var(--lucio-green);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success-message.show { display: flex; }

        .skip-login {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-gray);
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .skip-login:hover {
            border-color: var(--lucio-green);
            color: var(--lucio-green);
        }

        /* Partículas */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            bottom: -30px;
            animation: floatUp linear infinite;
            opacity: 0.4;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        /* ============ APP CONTAINER ============ */
        .app-container {
            display: none;
            width: 100%;
            height: 100vh;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.5s ease;
            flex-direction: column;
        }

        .app-container.visible {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        /* ============ HEADER ============ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            background: rgba(9, 20, 40, 0.95);
            border-bottom: 1px solid rgba(164, 214, 21, 0.2);
            flex-shrink: 0;
        }

        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-header .logo svg {
            width: 40px;
            height: 40px;
        }

        .app-header .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--text-white);
        }

        .app-header .logo-accent { color: var(--lucio-green); }

        .app-header .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-header .user-name {
            color: var(--lucio-green);
            font-weight: 600;
            font-size: 16px;
        }

        .app-header .logout-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-gray);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            transition: all 0.3s;
        }

        .app-header .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: linear-gradient(to bottom, rgba(15, 35, 67, 0.5), var(--darker-blue));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .welcome-box {
            text-align: center;
            max-width: 600px;
        }

        .welcome-box h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--text-white);
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(164, 214, 21, 0.5);
        }

        .welcome-box p {
            color: var(--text-gray);
            font-size: 20px;
            margin-bottom: 30px;
        }

        .welcome-box .highlight {
            color: var(--lucio-green);
        }

        .status-card {
            background: rgba(15, 35, 67, 0.6);
            border: 1px solid rgba(164, 214, 21, 0.2);
            border-radius: 16px;
            padding: 30px 40px;
            display: inline-block;
        }

        .status-card .label {
            color: var(--text-gray);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-card .value {
            color: var(--lucio-green);
            font-size: 24px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            margin-top: 5px;
        }

        .status-card .connected {
            color: #00FF00;
            font-size: 14px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-card .connected::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00FF00;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ============ RESPONSIVO ============ */
        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .welcome-box h1 { font-size: 32px; }
            .login-title { font-size: 36px; }
            .app-header { padding: 15px 20px; flex-wrap: wrap; gap: 10px; }
            .app-header .user-area { flex-wrap: wrap; }
        }

        @media (max-width: 480px) {
            .login-title { font-size: 28px; }
            .welcome-box h1 { font-size: 24px; }
            .status-card { padding: 20px; }
            .app-header .logo-text { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- ============ ECRÃ DE LOGIN ============ -->
    <div class="login-screen" id="loginScreen">
        <div class="sound-waves">
            <div class="wave wave1"></div>
            <div class="wave wave2"></div>
            <div class="wave wave3"></div>
            <div class="wave wave4"></div>
        </div>
        <div class="particles" id="particles"></div>

        <div class="login-container">
            <div class="login-logo">
                <div class="lucio-symbol-large">
                    <svg viewBox="0 0 100 100" width="120" height="120">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#A4D615" stroke-width="3">
                            <animate attributeName="r" values="45;48;45" dur="2s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="50" cy="45" r="15" fill="#A4D615" opacity="0.8"/>
                        <circle cx="42" cy="40" r="4" fill="#0F2343"/>
                        <circle cx="58" cy="40" r="4" fill="#0F2343"/>
                        <path d="M42 52 Q50 60 58 52" stroke="#0F2343" stroke-width="2" fill="none"/>
                    </svg>
                </div>
                <h1 class="login-title">LÚCIO<span style="color:#A4D615">.fm</span></h1>
                <p class="login-subtitle">Vamos aumentar o som!</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">Nome de Herói</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🦸</span>
                        <input type="text" id="username" placeholder="Ex: DJ_Lucio_OW" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="password">Código de Acesso</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                    </div>
                </div>
                <button type="submit" class="login-button" id="loginButton">
                    <span>ENTRAR NO JOGO</span>
                    <span class="button-icon">🎧</span>
                </button>
                <div class="login-options">
                    <a id="toggleAuthMode">Criar conta</a>
                </div>
            </form>

            <div class="login-voiceline">
                <p id="loginVoiceline">"Isso é Lúcio-oh-oh!"</p>
            </div>

            <div class="error-message" id="errorMessage">
                <span>⚠️</span> <span id="errorText">Erro!</span>
            </div>

            <div class="success-message" id="successMessage">
                <span>✅</span> <span id="successText">Sucesso!</span>
            </div>

            <button class="skip-login" id="skipLoginBtn">Entrar como convidado 🐸</button>
        </div>
    </div>

    <!-- ============ APP PRINCIPAL ============ -->
    <div class="app-container" id="appContainer">
        <header class="app-header">
            <div class="logo">
                <svg viewBox="0 0 100 100" width="40" height="40">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#A4D615" stroke-width="3"/>
                    <circle cx="50" cy="45" r="15" fill="#A4D615" opacity="0.8"/>
                    <circle cx="42" cy="40" r="4" fill="#0F2343"/>
                    <circle cx="58" cy="40" r="4" fill="#0F2343"/>
                    <path d="M42 52 Q50 60 58 52" stroke="#0F2343" stroke-width="2" fill="none"/>
                </svg>
                <span class="logo-text">LÚCIO<span class="logo-accent">.fm</span></span>
            </div>
            <div class="user-area">
                <span class="user-name" id="displayName">Carregando...</span>
                <button class="logout-btn" id="logoutBtn">Sair</button>
            </div>
        </header>

        <main class="main-content">
            <div class="welcome-box">
                <h1>🎶 VAMOS AUMENTAR O SOM!</h1>
                <p>
                    Bem-vindo(a) ao <span class="highlight">Lúcio.fm</span>!<br>
                    A tua conta está ligada à Supabase 🔗
                </p>
                <div class="status-card">
                    <div class="label">Status da Conexão</div>
                    <div class="value">✅ Conectado</div>
                    <div class="connected">Supabase ativa</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // =====================================================
        // CONFIGURAÇÃO SUPABASE
        // =====================================================
        const SUPABASE_URL = 'https://hijrhoujydouxkvwupgw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FrehZQeVQthZW9uQSpAyqg_acRKGIQo';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // =====================================================
        // ELEMENTOS DOM
        // =====================================================
        const loginScreen = document.getElementById('loginScreen');
        const appContainer = document.getElementById('appContainer');
        const loginForm = document.getElementById('loginForm');
        const loginButton = document.getElementById('loginButton');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');
        const successText = document.getElementById('successText');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const skipLoginBtn = document.getElementById('skipLoginBtn');
        const displayName = document.getElementById('displayName');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginVoiceline = document.getElementById('loginVoiceline');

        let isRegistering = false;
        let currentUser = null;

        // =====================================================
        // PARTÍCULAS
        // =====================================================
        function createParticles() {
            const container = document.getElementById('particles');
            const emojis = ['🎵', '🎶', '🔊', '⚡', '💚', '🎧', '🥁'];
            for (let i = 0; i < 20; i++) {
                const el = document.createElement('span');
                el.className = 'particle';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.fontSize = (14 + Math.random() * 20) + 'px';
                el.style.animationDuration = (10 + Math.random() * 20) + 's';
                el.style.animationDelay = (Math.random() * 15) + 's';
                container.appendChild(el);
            }
        }
        createParticles();

        // =====================================================
        // VOICELINES
        // =====================================================
        const voicelines = [
            '"Isso é Lúcio-oh-oh!"',
            '"Vamos aumentar o som!"',
            '"Sinta o ritmo!"',
            '"Bora lá, pessoal!"',
            '"A cura está no som!"'
        ];

        function randomVoiceline() {
            return voicelines[Math.floor(Math.random() * voicelines.length)];
        }

        setInterval(() => {
            if (!loginScreen.classList.contains('hidden')) {
                loginVoiceline.textContent = randomVoiceline();
            }
        }, 5000);

        // =====================================================
        // FUNÇÕES DE UI
        // =====================================================
        function showError(message) {
            errorText.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => errorMessage.classList.remove('show'), 4000);
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMessage.classList.add('show');
            setTimeout(() => successMessage.classList.remove('show'), 4000);
        }

        function setLoading(loading) {
            if (loading) {
                loginButton.disabled = true;
                loginButton.innerHTML = '<span>⏳</span><span>A CARREGAR...</span>';
            } else {
                loginButton.disabled = false;
                const label = isRegistering ? 'CRIAR CONTA' : 'ENTRAR NO JOGO';
                loginButton.innerHTML = `<span>${label}</span><span class="button-icon">🎧</span>`;
            }
        }

        // =====================================================
        // AUTENTICAÇÃO
        // =====================================================
        async function handleLogin(e) {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('Preenche todos os campos!');
                return;
            }

            if (password.length < 6) {
                showError('A senha deve ter pelo menos 6 caracteres!');
                return;
            }

            setLoading(true);

            try {
                const email = username.toLowerCase().replace(/\s/g, '') + '@lucio.fm';

                if (isRegistering) {
                    // REGISTO
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                        options: {
                            data: { username: username }
                        }
                    });

                    if (error) throw error;

                    if (data.user) {
                        showSuccess('Conta criada com sucesso! Faz login para continuar.');
                        // Volta para modo login
                        isRegistering = false;
                        toggleAuthMode.textContent = 'Criar conta';
                        loginButton.innerHTML = '<span>ENTRAR NO JOGO</span><span class="button-icon">🎧</span>';
                        passwordInput.value = '';
                        setLoading(false);
                        return;
                    }
                } else {
                    // LOGIN
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) throw error;

                    if (data.user) {
                        currentUser = data.user;
                        const displayName_ = data.user.user_metadata?.username || username;
                        enterApp(displayName_);
                        return;
                    }
                }
            } catch (error) {
                console.error('Erro:', error);
                if (error.message.includes('Invalid login credentials')) {
                    showError('Credenciais inválidas! Verifica o código de acesso.');
                } else if (error.message.includes('User already registered')) {
                    showError('Este nome já está registado! Faz login.');
                } else if (error.message.includes('Password should be at least 6 characters')) {
                    showError('A senha deve ter pelo menos 6 caracteres.');
                } else {
                    showError('Erro: ' + error.message);
                }
            }

            setLoading(false);
        }

        // Alternar entre login e registo
        toggleAuthMode.addEventListener('click', (e) => {
            e.preventDefault();
            isRegistering = !isRegistering;
            toggleAuthMode.textContent = isRegistering ? 'Fazer login' : 'Criar conta';
            loginButton.innerHTML = isRegistering 
                ? '<span>CRIAR CONTA</span><span class="button-icon">🎧</span>'
                : '<span>ENTRAR NO JOGO</span><span class="button-icon">🎧</span>';
            passwordInput.placeholder = isRegistering ? 'Mínimo 6 caracteres' : '••••••••';
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        });

        // Login como convidado
        skipLoginBtn.addEventListener('click', () => {
            const guestName = 'Convidado_' + Math.floor(Math.random() * 1000);
            currentUser = { user_metadata: { username: guestName }, id: 'guest_' + Date.now() };
            enterApp(guestName);
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                if (currentUser && !currentUser.id.startsWith('guest_')) {
                    await supabase.auth.signOut();
                }
                currentUser = null;
                appContainer.classList.remove('visible');
                setTimeout(() => {
                    appContainer.style.display = 'none';
                    loginScreen.classList.remove('hidden');
                    usernameInput.value = '';
                    passwordInput.value = '';
                }, 300);
            } catch (error) {
                console.error('Erro ao sair:', error);
            }
        });

        // =====================================================
        // ENTRAR NA APP
        // =====================================================
        function enterApp(username) {
            displayName.textContent = username;
            loginScreen.classList.add('hidden');
            appContainer.style.display = 'flex';
            setTimeout(() => {
                appContainer.classList.add('visible');
            }, 50);
        }

        // =====================================================
        // VERIFICAR SESSÃO
        // =====================================================
        async function checkSession() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (data.session) {
                    currentUser = data.session.user;
                    const username = currentUser.user_metadata?.username || 'DJ_Lucio_OW';
                    enterApp(username);
                }
            } catch (error) {
                console.error('Erro ao verificar sessão:', error);
            }
        }

        // =====================================================
        // EVENT LISTENERS
        // =====================================================
        loginForm.addEventListener('submit', handleLogin);

        // =====================================================
        // INICIALIZAÇÃO
        // =====================================================
        checkSession();

        // Mostra a senha como "lucio123" para teste rápido
        console.log('🔑 Para teste rápido, podes usar:');
        console.log('   Utilizador: lucio');
        console.log('   Senha: lucio123');
        console.log('   Ou cria uma conta nova!');
    </script>
</body>
</html>
