<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lúcio.fm - DJ Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* ============================================
                   RESET & VARIÁVEIS
                   ============================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --bg-card: #1A1A1A;
            --bg-input: #222222;
            --bg-hover: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-muted: #666666;
            --accent: #1DB954;
            --accent-hover: #1ED760;
            --border: #2A2A2A;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --transition: all 0.2s ease;
            --deck-bg: #1A1A1A;
            --deck-border: #333333;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* ============================================
                   SCROLLBAR
                   ============================================ */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }

        /* ============================================
                   LOGIN SCREEN
                   ============================================ */
        .login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            z-index: 1000;
            transition: opacity 0.4s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 0 24px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .login-brand .logo span {
            color: var(--accent);
        }

        .login-brand .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .login-box {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 32px;
            border: 1px solid var(--border);
        }

        .login-box .field {
            margin-bottom: 18px;
        }

        .login-box .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .login-box .field input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: var(--transition);
        }

        .login-box .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(29, 185, 84, 0.15);
        }

        .login-box .field input::placeholder {
            color: var(--text-muted);
        }

        .login-box .field.hidden {
            display: none;
        }

        .login-box .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 4px;
        }

        .login-box .btn-primary:hover {
            background: var(--accent-hover);
        }

        .login-box .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-box .toggle-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-box .toggle-link:hover {
            color: var(--text-primary);
        }

        .login-box .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .login-box .divider::before,
        .login-box .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .login-box .btn-ghost {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .login-box .btn-ghost:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .login-box .msg {
            display: none;
            padding: 12px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 16px;
            align-items: center;
            gap: 8px;
        }

        .login-box .msg.show {
            display: flex;
        }

        .login-box .msg.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #F87171;
        }

        .login-box .msg.success {
            background: rgba(29, 185, 84, 0.1);
            border: 1px solid rgba(29, 185, 84, 0.25);
            color: var(--accent);
        }

        /* ============================================
                   APP LAYOUT
                   ============================================ */
        .app {
            display: none;
            height: 100vh;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.4s ease;
            background: var(--bg-primary);
        }

        .app.visible {
            display: flex;
            opacity: 1;
        }

        /* ============================================
                   TOP BAR
                   ============================================ */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .topbar .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .topbar .brand span {
            color: var(--accent);
        }

        .topbar .brand svg {
            width: 24px;
            height: 24px;
        }

        .topbar .user {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar .user .name {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        .topbar .user .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: #fff;
        }

        .topbar .user .logout {
            padding: 5px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .topbar .user .logout:hover {
            border-color: #EF4444;
            color: #EF4444;
        }

        .topbar .import-btn {
            padding: 6px 18px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .topbar .import-btn:hover {
            background: var(--accent-hover);
        }

        /* ============================================
                   DJ DECK
                   ============================================ */
        .dj-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px 24px 24px 24px;
            gap: 16px;
            background: var(--bg-primary);
        }

        .dj-decks {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
        }

        .deck {
            flex: 1;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .deck .deck-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deck .deck-label .deck-status {
            color: var(--accent);
            font-size: 10px;
        }

        .deck .waveform-container {
            flex: 1;
            background: var(--bg-primary);
            border-radius: var(--radius);
            min-height: 80px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .deck .waveform-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .deck .waveform-container .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--accent);
            left: 0;
            transition: left 0.1s linear;
            pointer-events: none;
            box-shadow: 0 0 10px rgba(29, 185, 84, 0.5);
        }

        .deck .controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .deck .controls .btn-deck {
            padding: 6px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .deck .controls .btn-deck:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .deck .controls .btn-deck.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .deck .controls .btn-deck.play {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .deck .controls .btn-deck.play:hover {
            background: var(--accent-hover);
        }

        .deck .controls .time-display {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: center;
            font-family: 'Inter', monospace;
        }

        .deck .controls .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 100px;
        }

        .deck .controls .slider-group label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
        }

        .deck .controls input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            min-width: 40px;
        }

        .deck .controls input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .deck .controls input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        .deck .track-info {
            margin-top: 10px;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .deck .track-info .track-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .deck .track-info .track-name.empty {
            color: var(--text-muted);
            font-weight: 400;
        }

        .deck .track-info .track-duration {
            font-size: 12px;
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            font-family: 'Inter', monospace;
            flex-shrink: 0;
        }

        /* ============================================
                   BOTTOM MIXER
                   ============================================ */
        .mixer {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 16px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            flex-shrink: 0;
        }

        .mixer .crossfader {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 150px;
        }

        .mixer .crossfader label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .mixer .crossfader input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
        }

        .mixer .crossfader input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        .mixer .crossfader input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        .mixer .mixer-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mixer .mixer-controls .btn-mixer {
            padding: 6px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .mixer .mixer-controls .btn-mixer:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .mixer .mixer-controls .btn-mixer.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        .mixer .mixer-controls .volume-display {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
            font-family: 'Inter', monospace;
            min-width: 40px;
            text-align: center;
        }

        /* ============================================
                   FILE INPUT HIDDEN
                   ============================================ */
        #fileInput {
            display: none;
        }

        /* ============================================
                   RESPONSIVE
                   ============================================ */
        @media (max-width: 1024px) {
            .dj-decks {
                flex-direction: column;
            }
            .deck {
                min-height: 200px;
            }
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 10px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .topbar .brand {
                font-size: 16px;
            }
            .dj-container {
                padding: 12px 12px 16px 12px;
            }
            .deck {
                padding: 14px;
                min-height: 160px;
            }
            .deck .controls {
                gap: 8px;
            }
            .deck .controls .btn-deck {
                padding: 4px 10px;
                font-size: 12px;
            }
            .mixer {
                flex-wrap: wrap;
                gap: 12px;
                padding: 12px 16px;
            }
            .mixer .crossfader {
                min-width: 100px;
            }
            .login-box {
                padding: 24px 20px;
            }
        }

        @media (max-width: 480px) {
            .deck .controls .slider-group {
                min-width: 60px;
            }
            .deck .controls .time-display {
                font-size: 12px;
                min-width: 60px;
            }
            .mixer .mixer-controls {
                gap: 8px;
                flex-wrap: wrap;
            }
        }

        /* ============================================
                   ANIMATION FOR LOADING
                   ============================================ */
        .loading-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% {
                content: '';
            }
            33% {
                content: '.';
            }
            66% {
                content: '..';
            }
            100% {
                content: '...';
            }
        }
    </style>
</head>
<body>

    <!-- ============================================================
    LOGIN SCREEN
    ============================================================ -->
    <div class="login-screen" id="loginScreen">
        <div class="login-wrapper">
            <div class="login-brand">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" fill="none" stroke="#1DB954" stroke-width="3" />
                        <circle cx="50" cy="45" r="15" fill="#1DB954" opacity="0.8" />
                        <circle cx="42" cy="40" r="4" fill="#121212" />
                        <circle cx="58" cy="40" r="4" fill="#121212" />
                        <path d="M42 52 Q50 60 58 52" stroke="#121212" stroke-width="2" fill="none" />
                    </svg>
                    Lúcio<span>.fm</span>
                </div>
                <div class="sub">DJ Studio</div>
            </div>

            <div class="login-box">
                <form id="loginForm">
                    <div class="field">
                        <label for="username">Utilizador</label>
                        <input type="text" id="username" placeholder="Ex: DJ_Lucio" required />
                    </div>
                    <div class="field">
                        <label for="password" id="passwordLabel">Palavra-passe</label>
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6" />
                    </div>
                    <div class="field hidden" id="confirmGroup">
                        <label for="confirmPassword">Confirmar palavra-passe</label>
                        <input type="password" id="confirmPassword" placeholder="Confirme a palavra-passe" />
                    </div>
                    <div class="field hidden" id="emailGroup">
                        <label for="email">Email (opcional)</label>
                        <input type="email" id="email" placeholder="exemplo@email.com" />
                    </div>
                    <div class="msg error" id="errorMsg">
                        <span>⚠️</span> <span id="errorText">Erro</span>
                    </div>
                    <div class="msg success" id="successMsg">
                        <span>✅</span> <span id="successText">Sucesso</span>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span id="loginBtnText">Entrar</span>
                    </button>
                    <span class="toggle-link" id="toggleMode">Criar conta</span>
                    <div class="divider">ou</div>
                    <button type="button" class="btn-ghost" id="guestBtn">Entrar como convidado</button>
                </form>
            </div>
        </div>
    </div>

    <!-- ============================================================
    APP - DJ STUDIO
    ============================================================ -->
    <div class="app" id="app">

        <!-- Top Bar -->
        <header class="topbar">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="45" fill="none" stroke="#1DB954" stroke-width="3" />
                    <circle cx="50" cy="45" r="15" fill="#1DB954" opacity="0.8" />
                    <circle cx="42" cy="40" r="4" fill="#121212" />
                    <circle cx="58" cy="40" r="4" fill="#121212" />
                    <path d="M42 52 Q50 60 58 52" stroke="#121212" stroke-width="2" fill="none" />
                </svg>
                Lúcio<span>.fm</span>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="import-btn" id="importBtn">📁 Importar Música</button>
                <div class="user">
                    <span class="name" id="userName">Utilizador</span>
                    <div class="avatar" id="userAvatar">U</div>
                    <button class="logout" id="logoutBtn">Sair</button>
                </div>
            </div>
        </header>

        <!-- DJ Deck -->
        <div class="dj-container">
            <div class="dj-decks">
                <!-- Deck A (Esquerda) -->
                <div class="deck" id="deckA">
                    <div class="deck-label">
                        <span>🎧 Deck A</span>
                        <span class="deck-status" id="deckAStatus">⏸ Parado</span>
                    </div>
                    <div class="waveform-container" id="waveformA">
                        <canvas id="canvasA"></canvas>
                        <div class="playhead" id="playheadA" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="btn-deck play" id="playA">▶ Play</button>
                        <button class="btn-deck" id="stopA">⏹ Stop</button>
                        <div class="slider-group">
                            <label>🔊</label>
                            <input type="range" id="volumeA" min="0" max="100" value="80" />
                        </div>
                        <div class="slider-group">
                            <label>⚡</label>
                            <input type="range" id="speedA" min="50" max="150" value="100" />
                        </div>
                        <span class="time-display" id="timeA">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="track-name empty" id="trackNameA">Nenhuma música carregada</span>
                        <span class="track-duration" id="trackDurationA">--:--</span>
                    </div>
                </div>

                <!-- Deck B (Direita) -->
                <div class="deck" id="deckB">
                    <div class="deck-label">
                        <span>🎧 Deck B</span>
                        <span class="deck-status" id="deckBStatus">⏸ Parado</span>
                    </div>
                    <div class="waveform-container" id="waveformB">
                        <canvas id="canvasB"></canvas>
                        <div class="playhead" id="playheadB" style="left:0%;"></div>
                    </div>
                    <div class="controls">
                        <button class="btn-deck play" id="playB">▶ Play</button>
                        <button class="btn-deck" id="stopB">⏹ Stop</button>
                        <div class="slider-group">
                            <label>🔊</label>
                            <input type="range" id="volumeB" min="0" max="100" value="80" />
                        </div>
                        <div class="slider-group">
                            <label>⚡</label>
                            <input type="range" id="speedB" min="50" max="150" value="100" />
                        </div>
                        <span class="time-display" id="timeB">00:00 / 00:00</span>
                    </div>
                    <div class="track-info">
                        <span class="track-name empty" id="trackNameB">Nenhuma música carregada</span>
                        <span class="track-duration" id="trackDurationB">--:--</span>
                    </div>
                </div>
            </div>

            <!-- Mixer -->
            <div class="mixer">
                <div class="crossfader">
                    <label>A</label>
                    <input type="range" id="crossfader" min="0" max="100" value="50" />
                    <label>B</label>
                </div>
                <div class="mixer-controls">
                    <button class="btn-mixer" id="syncBtn">🔄 Sync</button>
                    <button class="btn-mixer" id="effectBtn">🎛 Efeitos</button>
                    <span class="volume-display" id="masterVolume">-6dB</span>
                </div>
            </div>
        </div>

        <!-- File Input -->
        <input type="file" id="fileInput" accept="audio/*" multiple />
    </div>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================
        // SUPABASE CONFIG
        // ============================================
        const SUPABASE_URL = 'https://hijrhoujydouxkvwupgw.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_FrehZQeVQthZW9uQSpAyqg_acRKGIQo';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================
        // DOM REFS
        // ============================================
        const $ = (id) => document.getElementById(id);

        // Login
        const loginScreen = $('loginScreen');
        const app = $('app');
        const loginForm = $('loginForm');
        const loginBtn = $('loginBtn');
        const loginBtnText = $('loginBtnText');
        const usernameInput = $('username');
        const passwordInput = $('password');
        const confirmInput = $('confirmPassword');
        const emailInput = $('email');
        const confirmGroup = $('confirmGroup');
        const emailGroup = $('emailGroup');
        const errorMsg = $('errorMsg');
        const errorText = $('errorText');
        const successMsg = $('successMsg');
        const successText = $('successText');
        const toggleMode = $('toggleMode');
        const guestBtn = $('guestBtn');
        const logoutBtn = $('logoutBtn');
        const userName = $('userName');
        const userAvatar = $('userAvatar');

        // DJ
        const importBtn = $('importBtn');
        const fileInput = $('fileInput');
        const canvasA = $('canvasA');
        const canvasB = $('canvasB');
        const playheadA = $('playheadA');
        const playheadB = $('playheadB');
        const playA = $('playA');
        const playB = $('playB');
        const stopA = $('stopA');
        const stopB = $('stopB');
        const volumeA = $('volumeA');
        const volumeB = $('volumeB');
        const speedA = $('speedA');
        const speedB = $('speedB');
        const timeA = $('timeA');
        const timeB = $('timeB');
        const trackNameA = $('trackNameA');
        const trackNameB = $('trackNameB');
        const trackDurationA = $('trackDurationA');
        const trackDurationB = $('trackDurationB');
        const deckAStatus = $('deckAStatus');
        const deckBStatus = $('deckBStatus');
        const crossfader = $('crossfader');
        const syncBtn = $('syncBtn');
        const effectBtn = $('effectBtn');
        const masterVolume = $('masterVolume');

        let isRegistering = false;
        let currentUser = null;

        // ============================================
        // AUDIO ENGINE
        // ============================================
        class Deck {
            constructor(id, canvas, playhead, playBtn, stopBtn, volumeSlider, speedSlider, timeDisplay, trackNameEl,
                trackDurationEl, statusEl) {
                this.id = id;
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.playhead = playhead;
                this.playBtn = playBtn;
                this.stopBtn = stopBtn;
                this.volumeSlider = volumeSlider;
                this.speedSlider = speedSlider;
                this.timeDisplay = timeDisplay;
                this.trackNameEl = trackNameEl;
                this.trackDurationEl = trackDurationEl;
                this.statusEl = statusEl;

                this.audioContext = null;
                this.audioBuffer = null;
                this.source = null;
                this.gainNode = null;
                this.isPlaying = false;
                this.startTime = 0;
                this.pausedAt = 0;
                this.duration = 0;
                this.analyser = null;
                this.animationId = null;
                this.waveformData = [];
                this.currentSpeed = 1;
                this.currentVolume = 0.8;

                this.setupCanvas();
                this.setupEventListeners();
            }

            setupCanvas() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width - 4 || 400;
                this.canvas.height = rect.height - 4 || 80;
            }

            setupEventListeners() {
                this.playBtn.addEventListener('click', () => this.togglePlay());
                this.stopBtn.addEventListener('click', () => this.stop());
                this.volumeSlider.addEventListener('input', (e) => {
                    this.currentVolume = e.target.value / 100;
                    if (this.gainNode) {
                        this.gainNode.gain.value = this.currentVolume;
                    }
                });
                this.speedSlider.addEventListener('input', (e) => {
                    this.currentSpeed = e.target.value / 100;
                    if (this.isPlaying && this.source) {
                        this.source.playbackRate.value = this.currentSpeed;
                    }
                });
            }

            async loadFile(file) {
                try {
                    // Reset
                    this.stop();
                    this.audioBuffer = null;
                    this.waveformData = [];

                    // Criar AudioContext se não existir
                    if (!this.audioContext) {
                        this.audioContext = new(window.AudioContext || window.webkitAudioContext)();
                    }

                    // Ler ficheiro
                    const arrayBuffer = await file.arrayBuffer();
                    this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                    this.duration = this.audioBuffer.duration;

                    // Gerar waveform
                    this.generateWaveform();

                    // Atualizar UI
                    this.trackNameEl.textContent = file.name;
                    this.trackNameEl.className = 'track-name';
                    this.trackDurationEl.textContent = this.formatTime(this.duration);
                    this.statusEl.textContent = '⏸ Carregado';
                    this.updateTimeDisplay(0);

                    // Desenhar waveform
                    this.drawWaveform();

                    return true;
                } catch (error) {
                    console.error('Erro ao carregar ficheiro:', error);
                    this.trackNameEl.textContent = '❌ Erro ao carregar';
                    this.trackNameEl.className = 'track-name';
                    return false;
                }
            }

            generateWaveform() {
                if (!this.audioBuffer) return;
                const data = this.audioBuffer.getChannelData(0);
                const samples = 200;
                this.waveformData = [];
                const step = Math.floor(data.length / samples);
                for (let i = 0; i < samples; i++) {
                    let sum = 0;
                    for (let j = 0; j < step; j++) {
                        sum += Math.abs(data[i * step + j] || 0);
                    }
                    this.waveformData.push(sum / step);
                }
            }

            drawWaveform() {
                const ctx = this.ctx;
                const w = this.canvas.width;
                const h = this.canvas.height;

                ctx.clearRect(0, 0, w, h);

                if (this.waveformData.length === 0) {
                    ctx.fillStyle = '#333';
                    ctx.font = '14px Inter, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Carregue uma música', w / 2, h / 2 + 5);
                    return;
                }

                const barWidth = Math.max(2, w / this.waveformData.length - 2);
                const centerY = h / 2;

                for (let i = 0; i < this.waveformData.length; i++) {
                    const val = this.waveformData[i];
                    const height = Math.max(2, val * h * 0.8);
                    const x = i * (barWidth + 2);

                    // Gradiente verde
                    const grad = ctx.createLinearGradient(0, centerY - height / 2, 0, centerY + height / 2);
                    grad.addColorStop(0, 'rgba(29, 185, 84, 0.4)');
                    grad.addColorStop(0.5, 'rgba(29, 185, 84, 0.9)');
                    grad.addColorStop(1, 'rgba(29, 185, 84, 0.4)');

                    ctx.fillStyle = grad;
                    ctx.fillRect(x, centerY - height / 2, barWidth, height);
                }

                // Linha central
                ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, centerY);
                ctx.lineTo(w, centerY);
                ctx.stroke();
            }

            togglePlay() {
                if (!this.audioBuffer) {
                    this.statusEl.textContent = '⚠️ Sem música';
                    return;
                }

                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                if (!this.audioBuffer || !this.audioContext) return;

                // Criar source
                this.source = this.audioContext.createBufferSource();
                this.source.buffer = this.audioBuffer;
                this.source.playbackRate.value = this.currentSpeed;

                // Criar gain node
                this.gainNode = this.audioContext.createGain();
                this.gainNode.gain.value = this.currentVolume;

                // Conectar
                this.source.connect(this.gainNode);
                this.gainNode.connect(this.audioContext.destination);

                // Analyser para visualização
                this.analyser = this.audioContext.createAnalyser();
                this.analyser.fftSize = 256;
                this.source.connect(this.analyser);

                // Iniciar
                const offset = this.pausedAt || 0;
                this.source.start(0, offset);
                this.startTime = this.audioContext.currentTime - offset;
                this.isPlaying = true;
                this.pausedAt = 0;

                this.playBtn.textContent = '⏸ Pausa';
                this.playBtn.classList.add('active');
                this.statusEl.textContent = '▶ A tocar';

                // Atualizar progresso
                this.updateProgress();
            }

            pause() {
                if (!this.isPlaying) return;
                this.pausedAt = this.audioContext.currentTime - this.startTime;
                this.source.stop();
                this.source = null;
                this.isPlaying = false;
                this.playBtn.textContent = '▶ Play';
                this.playBtn.classList.remove('active');
                this.statusEl.textContent = '⏸ Em pausa';

                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            stop() {
                if (this.isPlaying) {
                    this.source.stop();
                    this.source = null;
                    this.isPlaying = false;
                    this.pausedAt = 0;
                }
                this.playBtn.textContent = '▶ Play';
                this.playBtn.classList.remove('active');
                this.statusEl.textContent = '⏹ Parado';
                this.updateTimeDisplay(0);
                this.playhead.style.left = '0%';

                if (this.animationId) {
                    cancelAnimationFrame(this.animationId);
                    this.animationId = null;
                }
            }

            updateProgress() {
                if (!this.isPlaying) return;

                const currentTime = this.audioContext.currentTime - this.startTime;
                const progress = Math.min(currentTime / this.duration, 1);

                this.updateTimeDisplay(currentTime);
                this.playhead.style.left = (progress * 100) + '%';

                if (progress >= 1) {
                    this.stop();
                    return;
                }

                this.animationId = requestAnimationFrame(() => this.updateProgress());
            }

            updateTimeDisplay(currentTime) {
                const formatted = this.formatTime(currentTime) + ' / ' + this.formatTime(this.duration);
                this.timeDisplay.textContent = formatted;
            }

            formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '00:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
            }

            resizeCanvas() {
                const rect = this.canvas.parentElement.getBoundingClientRect();
                this.canvas.width = rect.width - 4 || 400;
                this.canvas.height = rect.height - 4 || 80;
                this.drawWaveform();
            }
        }

        // ============================================
        // INICIALIZAR DECKS
        // ============================================
        const deckA = new Deck(
            'A',
            canvasA,
            playheadA,
            playA,
            stopA,
            volumeA,
            speedA,
            timeA,
            trackNameA,
            trackDurationA,
            deckAStatus
        );

        const deckB = new Deck(
            'B',
            canvasB,
            playheadB,
            playB,
            stopB,
            volumeB,
            speedB,
            timeB,
            trackNameB,
            trackDurationB,
            deckBStatus
        );

        const decks = [deckA, deckB];
        let currentDeckIndex = 0;

        // ============================================
        // FILE IMPORT
        // ============================================
        importBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const files = e.target.files;
            if (files.length === 0) return;

            for (const file of files) {
                const deck = decks[currentDeckIndex];
                const success = await deck.loadFile(file);
                if (success) {
                    currentDeckIndex = (currentDeckIndex + 1) % decks.length;
                }
            }

            fileInput.value = '';
        });

        // ============================================
        // CROSSFADER
        // ============================================
        crossfader.addEventListener('input', (e) => {
            const val = e.target.value / 100;
            // Controla o volume dos decks baseado no crossfader
            const volA = Math.max(0, 1 - val * 2);
            const volB = Math.max(0, val * 2 - 0);
            if (deckA.gainNode) deckA.gainNode.gain.value = (val < 0.5) ? deckA.currentVolume : deckA.currentVolume * (1 -
                val * 2);
            if (deckB.gainNode) deckB.gainNode.gain.value = (val > 0.5) ? deckB.currentVolume : deckB.currentVolume * (val *
                2);
        });

        // ============================================
        // SYNC
        // ============================================
        syncBtn.addEventListener('click', () => {
            if (deckA.isPlaying && deckB.isPlaying) {
                // Sincroniza o tempo
                const currentTime = deckA.audioContext.currentTime - deckA.startTime;
                deckB.pause();
                deckB.pausedAt = currentTime;
                deckB.play();
                syncBtn.classList.toggle('active');
            }
        });

        // ============================================
        // EFFECTS (simples)
        // ============================================
        let effectsActive = false;
        effectBtn.addEventListener('click', () => {
            effectsActive = !effectsActive;
            effectBtn.classList.toggle('active');
            if (effectsActive) {
                // Aplica efeito de filtro (simulação)
                masterVolume.textContent = '+3dB';
                if (deckA.audioContext) {
                    // Simplesmente muda o tom
                    if (deckA.source) deckA.source.playbackRate.value = deckA.currentSpeed * 1.05;
                    if (deckB.source) deckB.source.playbackRate.value = deckB.currentSpeed * 1.05;
                }
            } else {
                masterVolume.textContent = '-6dB';
                if (deckA.source) deckA.source.playbackRate.value = deckA.currentSpeed;
                if (deckB.source) deckB.source.playbackRate.value = deckB.currentSpeed;
            }
        });

        // ============================================
        // RESIZE
        // ============================================
        window.addEventListener('resize', () => {
            decks.forEach(d => d.resizeCanvas());
        });

        // ============================================
        // LOGIN FUNCTIONS
        // ============================================
        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('show');
            successMsg.classList.remove('show');
            setTimeout(() => errorMsg.classList.remove('show'), 4000);
        }

        function showSuccess(msg) {
            successText.textContent = msg;
            successMsg.classList.add('show');
            errorMsg.classList.remove('show');
            setTimeout(() => successMsg.classList.remove('show'), 4000);
        }

        function setLoading(loading) {
            loginBtn.disabled = loading;
            loginBtnText.textContent = loading ? 'A processar…' : (isRegistering ? 'Criar conta' : 'Entrar');
        }

        function toggleModeFn() {
            isRegistering = !isRegistering;
            toggleMode.textContent = isRegistering ? 'Fazer login' : 'Criar conta';
            loginBtnText.textContent = isRegistering ? 'Criar conta' : 'Entrar';

            if (isRegistering) {
                confirmGroup.classList.remove('hidden');
                emailGroup.classList.remove('hidden');
                passwordInput.placeholder = 'Mínimo 6 caracteres';
            } else {
                confirmGroup.classList.add('hidden');
                emailGroup.classList.add('hidden');
                passwordInput.placeholder = 'Palavra-passe';
                confirmInput.value = '';
                emailInput.value = '';
            }

            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
        }

        function enterApp(username) {
            userName.textContent = username;
            userAvatar.textContent = username.charAt(0).toUpperCase();

            loginScreen.classList.add('hidden');
            app.style.display = 'flex';
            setTimeout(() => {
                app.classList.add('visible');
                // Redimensiona canvases após entrar
                setTimeout(() => decks.forEach(d => d.resizeCanvas()), 100);
            }, 50);
        }

        // ============================================
        // AUTH
        // ============================================
        async function handleLogin(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const confirm = confirmInput.value.trim();
            const email = emailInput.value.trim();

            if (!username || !password) {
                showError('Preencha todos os campos obrigatórios.');
                return;
            }

            if (password.length < 6) {
                showError('A palavra-passe deve ter pelo menos 6 caracteres.');
                return;
            }

            if (isRegistering && password !== confirm) {
                showError('As palavras-passe não coincidem.');
                return;
            }

            setLoading(true);

            try {
                const userEmail = email || username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@lucio.fm';

                if (isRegistering) {
                    const { data, error } = await supabase.auth.signUp({
                        email: userEmail,
                        password: password,
                        options: {
                            data: { username, display_name: username }
                        }
                    });

                    if (error) throw error;

                    if (data.user) {
                        showSuccess('✅ Conta criada! Faça login para continuar.');
                        setTimeout(() => {
                            if (isRegistering) toggleModeFn();
                            passwordInput.value = '';
                            confirmInput.value = '';
                        }, 1500);
                        setLoading(false);
                        return;
                    }
                } else {
                    const userEmail = username.toLowerCase().replace(/[^a-z0-9]/g, '') + '@lucio.fm';
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email: userEmail,
                        password: password
                    });

                    if (error) throw error;

                    if (data.user) {
                        currentUser = data.user;
                        const displayName = data.user.user_metadata?.username || username;
                        enterApp(displayName);
                        return;
                    }
                }
            } catch (err) {
                console.error('Erro:', err);
                if (err.message.includes('Invalid login credentials')) {
                    showError('Credenciais inválidas. Verifique os dados.');
                } else if (err.message.includes('User already registered')) {
                    showError('Utilizador já registado. Faça login.');
                } else {
                    showError('Erro: ' + err.message);
                }
            }

            setLoading(false);
        }

        // ============================================
        // LOGOUT
        // ============================================
        async function doLogout() {
            try {
                if (currentUser && !currentUser.id.startsWith('guest_')) {
                    await supabase.auth.signOut();
                }
                currentUser = null;
                app.classList.remove('visible');
                setTimeout(() => {
                    app.style.display = 'none';
                    loginScreen.classList.remove('hidden');
                    usernameInput.value = '';
                    passwordInput.value = '';
                    confirmInput.value = '';
                    emailInput.value = '';
                }, 300);
            } catch (err) {
                console.error('Erro ao sair:', err);
            }
        }

        // ============================================
        // SESSION CHECK
        // ============================================
        async function checkSession() {
            try {
                const { data, error } = await supabase.auth.getSession();
                if (error) throw error;

                if (data.session) {
                    currentUser = data.session.user;
                    const username = currentUser.user_metadata?.username || 'DJ_Lucio';
                    enterApp(username);
                }
            } catch (err) {
                console.error('Erro ao verificar sessão:', err);
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        loginForm.addEventListener('submit', handleLogin);
        toggleMode.addEventListener('click', (e) => { e.preventDefault();
            toggleModeFn(); });

        guestBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const guestName = 'Convidado_' + Math.floor(Math.random() * 10000);
            currentUser = {
                user_metadata: { username: guestName },
                id: 'guest_' + Date.now()
            };
            enterApp(guestName);
        });

        logoutBtn.addEventListener('click', doLogout);

        // ============================================
        // DRAG AND DROP
        // ============================================
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = e.dataTransfer.files;
            if (files.length === 0) return;

            for (const file of files) {
                if (file.type.startsWith('audio/')) {
                    const deck = decks[currentDeckIndex];
                    const success = await deck.loadFile(file);
                    if (success) {
                        currentDeckIndex = (currentDeckIndex + 1) % decks.length;
                    }
                }
            }
        });

        // ============================================
        // INIT
        // ============================================
        checkSession();

        console.log('🎵 Lúcio.fm — DJ Studio');
        console.log('📁 Importe músicas para começar a mixar!');
        console.log('🎚️ Use os controles de cada deck para tocar, parar e ajustar volume/speed');
        console.log('🎛️ O crossfader faz a transição entre os decks');
        console.log('🔄 Sync sincroniza o tempo entre as duas músicas');
    </script>
